name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: macos-14   # Apple Silicon runner; Xcode 15+, supports universal builds
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Build (debug)
        run: swift build

      - name: Build (release, universal)
        run: swift build -c release --arch arm64 --arch x86_64

      - name: Package .app + .dmg (smoke test)
        run: VERSION=ci-${{ github.run_number }} ./scripts/package.sh

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: TimeAgent-app
          path: dist/TimeAgent.app
          if-no-files-found: error
